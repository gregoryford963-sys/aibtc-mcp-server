name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@aibtcdev'

      - name: Publish to GitHub Packages
        run: |
          npm pkg set name="@aibtcdev/aibtc-mcp-server"
          npm publish --access public
          npm pkg set name="@aibtc/mcp-server"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Reset npm registry for ClawHub
        if: ${{ !contains(needs.release-please.outputs.tag_name, '-') }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to ClawHub
        if: ${{ !contains(needs.release-please.outputs.tag_name, '-') }}
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"

          # Authenticate with ClawHub
          npx clawhub login --token "$CLAWHUB_API_TOKEN" --no-browser

          # Get previous tag for changelog
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Generate changelog for ClawHub
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD | head -20)
          else
            CHANGELOG="Initial release"
          fi

          npx clawhub publish ./skill \
            --slug aibtc-bitcoin-wallet \
            --name "AIBTC Bitcoin Wallet" \
            --version "$VERSION" \
            --changelog "$CHANGELOG" \
            --tags latest
        env:
          CLAWHUB_API_TOKEN: ${{ secrets.CLAWHUB_API_TOKEN }}
